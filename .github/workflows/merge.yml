name: merge-live

on:
  schedule:
    - cron: '0 */2 * * *'   # 每 2 小时（UTC）跑一次
  workflow_dispatch:         # 允许在 Actions 页面手动触发

permissions:
  contents: write

concurrency:
  group: merge-live
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 合并直播源
        run: bash merge.sh

      - name: 有变化则提交
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- LIVE-merged.m3u; then
            git add LIVE-merged.m3u
            git commit -m "chore: 自动更新合并直播源 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "内容无变化，跳过提交"
          fi
